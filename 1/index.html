<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APPVIOUR | Digital Studio</title>
    <style>
        :root {
            --accent: #FF6A00;
            --shutter: #0a0a0a;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --frame-thickness: 2px;
            --frame-size: 50px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: var(--font-main);
            color: #111;
        }

        /* 1. Background & Texture */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: url('images/img/bgg.png') no-repeat center center;
            background-size: cover;
            animation: kenBurns 6s ease-out forwards;
        }

        @keyframes kenBurns {
            from { transform: scale(1.1); }
            to { transform: scale(1.02); }
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 100%),
                        rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            z-index: 2;
        }

        /* 2. Content */
        .content {
            position: relative;
            z-index: 5;
            text-align: center;
            width: 100%;
        }

        .brand {
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            display: flex;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .char {
            display: inline-block;
            transform: translateY(105%);
            animation: charRise 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes charRise {
            to { transform: translateY(0); }
        }

        .tagline {
            margin-top: 15px;
            font-size: clamp(0.7rem, 2vw, 0.95rem);
            font-weight: 300;
            letter-spacing: 0.1em;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 1.2s ease 1.2s forwards;
        }

        .line-draw {
            width: 0;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 20px auto 0;
            animation: drawLine 2s cubic-bezier(0.7, 0, 0.3, 1) 1.5s forwards;
        }

        @keyframes drawLine {
            to { width: 40%; opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 0.8; transform: translateY(0); }
        }

        /* 3. Bold 4-Corner UI Frames */
        .frame {
            position: fixed;
            width: var(--frame-size);
            height: var(--frame-size);
            z-index: 6;
            opacity: 0;
            animation: frameEntry 1s ease 0.5s forwards;
        }

        @keyframes frameEntry {
            to { opacity: 0.6; }
        }

        .top-left { 
            top: 40px; left: 40px; 
            border-left: var(--frame-thickness) solid #000; 
            border-top: var(--frame-thickness) solid #000; 
        }
        .top-right { 
            top: 40px; right: 40px; 
            border-right: var(--frame-thickness) solid #000; 
            border-top: var(--frame-thickness) solid #000; 
        }
        .bottom-left { 
            bottom: 40px; left: 40px; 
            border-left: var(--frame-thickness) solid #000; 
            border-bottom: var(--frame-thickness) solid #000; 
        }
        .bottom-right { 
            bottom: 40px; right: 40px; 
            border-right: var(--frame-thickness) solid #000; 
            border-bottom: var(--frame-thickness) solid #000; 
        }

        /* 4. The Exit Shutter */
        .shutter {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--shutter);
            z-index: 9999;
            transform: translateY(100%);
        }

        .shutter.active {
            animation: shutterSlide 0.8s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }

        @keyframes shutterSlide {
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="overlay"></div>

    <div class="frame top-left"></div>
    <div class="frame top-right"></div>
    <div class="frame bottom-left"></div>
    <div class="frame bottom-right"></div>

    <div class="content">
        <h1 class="brand" id="brand-text">APPVIOUR</h1>
        <p class="tagline">Turn your idea into digital presence with Appviour</p>
        <div class="line-draw"></div>
    </div>

    <div id="shutter" class="shutter"></div>

    <script>
        const brand = document.getElementById('brand-text');
        const text = brand.innerText;
        brand.innerHTML = '';
        
        [...text].forEach((char, i) => {
            const span = document.createElement('span');
            span.innerText = char === ' ' ? '\u00A0' : char;
            span.className = 'char';
            span.style.animationDelay = `${i * 0.07}s`;
            brand.appendChild(span);
        });

        window.addEventListener('load', () => {
            const shutter = document.getElementById('shutter');
            setTimeout(() => { shutter.classList.add('active'); }, 3300);
            setTimeout(() => { window.location.href = 'home.html'; }, 4000);
        });
    </script>


</body>
</html>
